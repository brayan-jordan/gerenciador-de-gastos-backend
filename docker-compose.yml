services:
  postgres:
    image: postgres:16-alpine
    container_name: gerenciador-de-gastos-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gerenciador_de_gastos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gerenciador_de_gastos']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
